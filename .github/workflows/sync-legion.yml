name: 🔄 키나 레기온 데이터 동기화

on:
  schedule:
    - cron: '0 0,12 * * *' # 매일 2번 자동 실행
  workflow_dispatch:      # 직접 버튼 눌러 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 코드 가져오기
        uses: actions/checkout@v3

      - name: 🏗️ Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 🇰🇷 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -fv

      - name: 📦 라이브러리 설치
        run: npm install

      - name: 🤖 크롤링 실행
        run: node crawl-aion2tool.js

      - name: 💾 데이터 저장 및 푸시
        run: |
          git config --local user.name "Seokjun"
          git config --local user.email "seokjun@example.com"
          mkdir -p data
          git add data/legion-data.json
          if ! git diff --cached --quiet; then
            git commit -m "🚀 데이터 업데이트: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "변경사항 없음"
          fi
